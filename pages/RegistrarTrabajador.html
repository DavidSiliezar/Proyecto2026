<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Trabajador - Panel de Flota</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/stylesRegTrab.css">
</head>
<body>

    <header class="barra-superior">
        <img src="../img/group3.svg" alt="Fleet Manager Logo" class="logo-principal">
        <button class="interruptor-movil" id="btn-menu-movil" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

            <aside class="barra-lateral" id="barra-lateral">
        <div class="interruptor-menu" id="btn-escritorio" style="cursor: pointer;">
            <i class="fa-solid fa-bars"></i>
        </div>
        
        <div class="mt-4 flex-grow-1 overflow-y-auto" style="overflow-x: hidden;">
            <a href="./Dashboard.html" class="item-menu"><i class="fa-solid fa-house"></i> Inicio</a>
            <a href="./Vehiculos.html" class="item-menu"><i class="fa-solid fa-car-side"></i> Vehículos</a>
            
            <div class="contenedor-submenu">
                <a href="./Mantenimiento.html" class="item-menu" aria-expanded="false" >
                    <i class="fa-solid fa-screwdriver-wrench"></i> Mantenimiento 
                    <i class="fa-solid fa-chevron-down ms-auto icono-desplegable"></i>
                </a>
                <div class="collapse" id="submenu-mantenimiento">
                    <a href="./MantPreventivo.html" class="item-sub-menu">Preventivo</a>
                    <a href="./MantenimientoCorrectivo.html" class="item-sub-menu">Correctivo</a>
                </div>
            </div>

            <a href="./Combustible.html" class="item-menu"><i class="fa-solid fa-gas-pump"></i> Combustible</a>
            <a href="./Accidentes.html" class="item-menu"><i class="fa-solid fa-car-burst"></i> Accidentes</a>
            <a href="./ReporteConductor.html" class="item-menu"><i class="fa-regular fa-file-lines"></i> Reporte conductor</a>
            <a href="./Trabajadores.html" class="item-menu"><i class="fa-solid fa-helmet-safety"></i> Trabajadores</a>
        </div>

        <a href="./PerfilUsuario.html" class="perfil-usuario text-decoration-none">
            <i class="fa-solid fa-circle-user fs-2 me-3"></i>
            <span class="nombre-usuario">Nombre de Usuario</span>
        </a>
    </aside>

    <main class="main-content" id="contenido-principal">
        <header class="cabecera-pagina">
            <h1 class="titulo-pagina">Trabajadores</h1>
        </header>

        <div class="row flex-grow-1 mt-3">
            <div class="col-12 pb-4">
                <section class="tarjeta-registro position-relative overflow-hidden">
                    <div class="position-absolute top-0 start-0 w-100 bg-primary" style="height: 8px; background: linear-gradient(135deg, #3f7bf5, #2563eb);"></div>
                    <a href="./Trabajadores.html" class="btn-cerrar position-absolute top-0 end-0 m-4 text-decoration-none bg-light rounded-circle d-flex align-items-center justify-content-center text-secondary shadow-sm" style="width: 40px; height: 40px; font-size: 24px;" aria-label="Volver al inicio">&times;</a>

                    <div class="mb-5 mt-2">
                        <h3 class="fw-bold text-dark mb-1">Registrar Trabajador</h3>
                        <p class="text-muted fs-6">Completa los datos para ingresar un nuevo empleado a la plataforma.</p>
                    </div>

                    <form action="#" method="POST" id="formularioRegistro">
                        <div class="row">
                            <div class="col-xl-8 col-lg-7">
                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Nombres</label>
                                        <div class="input-group rounded-4 shadow-sm">
                                            <span class="input-group-text bg-white border-end-0 text-muted px-3 rounded-start-4"><i class="fa-regular fa-user"></i></span>
                                            <input type="text" class="form-control entrada-formulario border-start-0 py-2 ps-0 rounded-end-4 bg-white" placeholder="Ej. Juan Carlos" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Apellidos</label>
                                        <div class="input-group rounded-4 shadow-sm">
                                            <span class="input-group-text bg-white border-end-0 text-muted px-3 rounded-start-4"><i class="fa-regular fa-user"></i></span>
                                            <input type="text" class="form-control entrada-formulario border-start-0 py-2 ps-0 rounded-end-4 bg-white" placeholder="Ej. Pérez" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Rol / Cargo</label>
                                        <div class="input-group rounded-4 shadow-sm">
                                            <span class="input-group-text bg-white border-end-0 text-muted px-3 rounded-start-4"><i class="fa-solid fa-briefcase"></i></span>
                                            <input type="text" class="form-control entrada-formulario border-start-0 py-2 ps-0 rounded-end-4 bg-white" placeholder="Ej. Conductor" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Correo Electrónico</label>
                                        <div class="input-group rounded-4 shadow-sm">
                                            <span class="input-group-text bg-white border-end-0 text-muted px-3 rounded-start-4"><i class="fa-regular fa-envelope"></i></span>
                                            <input type="email" class="form-control entrada-formulario border-start-0 py-2 ps-0 rounded-end-4 bg-white" placeholder="correo@ejemplo.com" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Número de Teléfono</label>
                                        <div class="input-group rounded-4 shadow-sm">
                                            <span class="input-group-text bg-white border-end-0 text-muted px-3 rounded-start-4"><i class="fa-solid fa-phone"></i></span>
                                            <input type="tel" class="form-control entrada-formulario border-start-0 py-2 ps-0 rounded-end-4 bg-white" placeholder="+503 0000-0000" required>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Carnet / DUI</label>
                                        <div class="input-group rounded-4 shadow-sm">
                                            <span class="input-group-text bg-white border-end-0 text-muted px-3 rounded-start-4"><i class="fa-regular fa-id-card"></i></span>
                                            <input type="text" class="form-control entrada-formulario border-start-0 py-2 ps-0 rounded-end-4 bg-white" placeholder="00000000-0">
                                        </div>
                                    </div>
                                    <div class="col-12 mt-4">
                                        <label class="form-label text-muted fw-semibold fs-7 mb-1" style="font-size: 13px;">Más detalles (Opcional)</label>
                                        <textarea class="form-control entrada-formulario p-3 rounded-4 shadow-sm bg-white" rows="4" placeholder="Información adicional relevante..."></textarea>
                                    </div>
                                </div>
                            </div>

                            <aside class="col-xl-4 col-lg-5 d-flex flex-column align-items-center mt-4 mt-lg-0 px-lg-4">
                                <label class="form-label text-muted fw-semibold fs-7 mb-3 align-self-start" style="font-size: 13px;">Fotografía del perfil</label>
                                <div class="caja-subir-foto w-100 rounded-4 mb-3 position-relative overflow-hidden shadow-sm" style="background-color: #f8fafc; border: 2px dashed #cbd5e1;">
                                    <input type="file" id="foto-input" class="position-absolute top-0 start-0 w-100 h-100 opacity-0" style="cursor: pointer; z-index: 10;">
                                    <div class="text-center px-4">
                                        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 70px; height: 70px;">
                                            <i class="fa-solid fa-cloud-arrow-up text-primary fs-3"></i>
                                        </div>
                                        <p class="text-secondary fw-semibold mb-1">Haz clic o arrastra una imagen</p>
                                        <p class="text-muted" style="font-size: 12px;">JPG, PNG, max. 5MB</p>
                                    </div>
                                </div>
                            </aside>
                        </div>

                        <div class="d-flex justify-content-end mt-5 pt-4 border-top">
                            <a href="./Trabajadores.html" class="btn btn-light px-4 py-2 fw-semibold rounded-pill me-3 text-secondary border">Cancelar</a>
                            <button type="button" id="btnGuardar" class="btn btn-primary px-5 py-2 fw-semibold rounded-pill shadow-sm" style="background: linear-gradient(135deg, #3f7bf5, #2563eb); border: none;">
                                <i class="fa-solid fa-check me-2"></i> Registrar trabajador
                            </button>
                        </div>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/Services/regTrabaj.js"></script>
    <script src="../js/Controllers/rebTrabaj.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/globalInteractions.js"></script>
</body>
</html>
