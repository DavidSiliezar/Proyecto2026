<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fleet Manager - Gráficas de Combustible</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/graficasCombustible.css">
</head>
<body>

    <header class="barra-superior" id="cabecera-app">
        <div class="contenedor-logo">
            <i class="fa-solid fa-gear icono-logo"></i> Fleet Manager
        </div>
        <button class="interruptor-movil" id="btn-menu-movil" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <div class="contenedor-principal" id="envoltorio-app">
        
        <aside class="barra-lateral" id="barra-lateral">
            <button class="interruptor-menu" aria-label="Colapsar menú">
                <i class="fa-solid fa-bars"></i>
            </button>
            <nav class="mt-2 flex-grow-1" aria-label="Menú principal">
                <a href="./Dashboard.html" class="enlace-navegacion"><i class="fa-solid fa-house"></i> Inicio</a>
                <a href="./Vehiculos.html" class="enlace-navegacion"><i class="fa-solid fa-car-side"></i> Vehículos</a>
                <a href="./Mantenimiento.html" class="enlace-navegacion"><i class="fa-solid fa-screwdriver-wrench"></i> Mantenimiento</a>
                <a href="./Combustible.html" class="enlace-navegacion activo"><i class="fa-solid fa-gas-pump"></i> Combustible</a>
                <a href="#" class="enlace-navegacion"><i class="fa-solid fa-car-burst"></i> Accidentes</a>
                <a href="#" class="enlace-navegacion"><i class="fa-solid fa-file-invoice"></i> Reporte conductor</a>
                <a href="./Trabajadores.html" class="enlace-navegacion"><i class="fa-solid fa-helmet-safety"></i> Trabajadores</a>
            </nav>
            
            <section class="perfil-usuario">
                <div class="avatar-placeholder"><i class="fa-solid fa-user"></i></div>
                <span>Nombre de Usuario</span>
            </section>
        </aside>

        <main class="contenido">
            <header class="cabecera-pagina-grafica mb-5 mt-2">
                <h1 class="titulo-pagina">Combustible</h1>
                <a href="./Combustible.html" class="btn-volver-atras">
                    <i class="fa-solid fa-angle-left"></i>
                </a>
            </header>

            <section class="tarjeta-grafica-principal">
                <div class="grafica-encabezado">
                    <div class="titulo-g">Gastos</div>
                    <div class="titulo-c">GAS</div>
                    <div class="grafica-leyenda">
                        <div class="cuadro-color azul-claro"></div>
                        <div class="cuadro-color azul-oscuro"></div>
                    </div>
                </div>
                
                <div class="contenedor-canvas-grafica">
                    <canvas id="graficoCombustible"></canvas>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/Services/graficasCombustible.js"></script>
    <script src="../js/Controllers/GraficasCombustible.js"></script>
</body>
</html>
