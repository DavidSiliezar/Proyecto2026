<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>

    <div class="container-fluid min-vh-100 d-flex p-0">
        <div class="row g-0 w-100">
            
            <div class="col-lg-6 d-none d-lg-block">
                <img src="./img/logo.jpeg" alt="Fondo de bienvenida" class="w-100 vh-100 object-fit-cover">
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white py-5">
                <div class="login-box px-4">
                    
                    <h1 class="login-title text-center mb-5">Bienvenido de Nuevo!</h1>
                    
                    <form>
                        <div class="mb-4">
                            <label for="username" class="form-label fw-bold">Usuario</label>
                            <input type="email" class="form-control custom-input" id="username" placeholder="usuario@example.com" required>
                        </div>
                        
                        <div class="mb-2 position-relative">
                            <label for="password" class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control custom-input pe-5" id="password" placeholder="********************" required>
                            <i class="bi bi-eye-slash password-toggle-icon"></i>
                        </div>
                        
                        <div class="text-end mb-5">
                            <a href="#" class="forgot-password-link text-decoration-none fw-bold">Olvidaste tu contraseña ?</a>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 btn-login fw-bold py-3">Iniciar Sesion</button>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
