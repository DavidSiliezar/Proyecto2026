<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./styles/styles.css">
</head>
<body>
    <div class="container-fluid min-vh-100 d-flex p-0">
        <div class="row g-0 w-100">
            <div class="col-lg-6 d-none d-lg-block">
                <img src="./img/logo.jpeg" alt="Fondo de bienvenida" class="w-100 vh-100 object-fit-cover animacion-imagen">
            </div>
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white py-5 animacion-panel">
                <div class="caja-login px-4">
                    <h1 class="titulo-login text-center mb-5">¡Bienvenido de Nuevo!</h1>
                    <form id="formulario-login" novalidate>
                        <div class="mb-4 position-relative">
                            <label for="usuario" class="form-label fw-bold">Usuario</label>
                            <input type="email" class="form-control entrada-personalizada" id="usuario" placeholder="usuario@example.com" required>
                            <div class="invalid-feedback">Por favor, ingrese un usuario válido.</div>
                        </div>
                        <div class="mb-2 position-relative">
                            <label for="clave" class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control entrada-personalizada pe-5" id="clave" placeholder="********************" required>
                            <i class="bi bi-eye-slash icono-alternar-clave" id="alternar-clave"></i>
                            <div class="invalid-feedback">Por favor, ingrese su contraseña.</div>
                        </div>
                        <div class="text-end mb-5">
                            <a href="#" class="enlace-olvido-clave text-decoration-none fw-bold">¿Olvidaste tu contraseña?</a>
                        </div>
                        <button type="submit" class="btn w-100 btn-ingreso fw-bold py-3 text-white" id="btn-submit">Iniciar Sesión</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/Controllers/indexController.js"></script>
    <script src="./js/Services/indexServices.js"></script>
</body>
</html>
